[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/salesdoc/login"
  to = "/.netlify/functions/salesdoc-login"
  status = 200

[[redirects]]
  from = "/api/salesdoc/products"
  to = "/.netlify/functions/salesdoc-products"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
